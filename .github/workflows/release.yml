name: Stable Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.0.0, v1.2.3-beta.1, etc. Got: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B -ntp verify

      - name: Select release jar
        id: jar
        shell: bash
        run: |
          file=$(find target -maxdepth 1 -type f -name 'heartattacklibs-*.jar' ! -name 'original-*' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n1)
          if [ -z "$file" ]; then
            echo "No release jar produced in target/" >&2
            exit 1
          fi
          echo "path=$file" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$file")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: HeartAttackLibs ${{ env.RELEASE_TAG }}
          body: |
            Stable HeartAttackLibs release.

            Built from `${{ github.sha }}` with Java 21 and Maven.
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true

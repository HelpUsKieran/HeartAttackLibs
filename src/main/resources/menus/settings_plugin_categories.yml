menu:
  id: settings_plugin_categories
  title: "<dark_gray><settings_selected_plugin> Settings"
  size: 36
  settings:
    cancel-clicks: true
    cancel-drag: true
    allow-player-inventory-click: false
  open-requirements:
    - type: permission
      permission: HeartAttackLibs.settings
      deny-message: "<red>You do not have permission for /settings."
  items:
    filler:
      slots: [0, 1, 2, 3, 4, 5, 6, 7, 8, 27, 28, 29, 30, 31, 32, 33, 34, 35]
      material: BLACK_STAINED_GLASS_PANE
      name: "<gray>"
    back:
      slot: 27
      material: ARROW
      name: "<!i><yellow>Back"
      click-actions:
        - "[open_menu] settings_plugins"
    close:
      slot: 35
      material: BARRIER
      name: "<!i><red>Close"
      click-actions:
        - "[close]"
  dynamic:
    categories:
      renderer-id: settings_plugin_categories
      slots: [10, 11, 12, 13, 14]
      left-click-actions:
        - "[settings_open_category]"
      right-click-actions:
        - "[settings_toggle_scoped]"
